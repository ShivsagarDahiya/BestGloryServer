spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_multi_vendor
spring.datasource.username=root
spring.datasource.password=YOUR_NEW_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Razorpay
razorpay.api.key=YOUR_TEST_KEY
razorpay.api.secret=YOUR_TEST_SECRET

# Stripe
stripe.api.key=YOUR_TEST_STRIPE_KEY

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL
spring.mail.password=YOUR_NEW_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Gemini
gemini.api.key=YOUR_NEW_GEMINI_KEY
